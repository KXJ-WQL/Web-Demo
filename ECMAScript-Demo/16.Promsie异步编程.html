<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Promise异步编程</title>
        
        <script type="text/javascript">

            // 1.简单的异步任务
            const promise = new Promise((resolve, reject)=>{
                setTimeout(()=>{
                    const success = true
                    if(success){
                        resolve("操作成功")
                    }else{
                        reject("操作失败")
                    }
                })
            }, 1000)

            promise
            .then(result => console.log(result)) // 操作成功
            .catch(error => console.log(error))
            .finally(() => console.log('任务完成'))

            // 2.多任务链式调用
            const task1 = () => {
                return new Promise((resolve, reject) => {
                    setTimeout(() => resolve('任务 1 完成'), 1000);
                });
            };

            const task2 = () => {
                return new Promise((resolve, reject)=>{
                    setTimeout(() => resolve('任务 2 完成'), 1000);
                })
            }

            const task3 = () => {
                return new Promise((resolve, reject)=>{
                    setTimeout(() => resolve('任务 3 完成'), 1000);
                })
            }

            const task4 = () => {
                return new Promise((resolve, reject)=>{
                    setTimeout(() => resolve('任务 4 完成'), 1000);
                })
            }
                  
            task1().then(result =>{
                console.log(result)
                return task2()
            })
            .then(result =>{
                console.log(result)
                return task3()
            })
            .then(result =>{
                console.log(result)
                return task4()
            })
            .then(result =>{
                console.log(result)
            })
            .catch(error => {
                console.error('出错了：', error);
            })
            .finally(() => console.log('所有任务结束'));


        
        </script>
    </head>
</html>
