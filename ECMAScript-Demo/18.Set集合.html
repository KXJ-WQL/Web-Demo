<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>set集合</title>
        
        <script type="text/javascript">
            // 创建Set
            const set1 = new Set() // 创建一个空的Set
            const set2 = new Set([1,2,3,4,5]) //创建Set并初始化
            console.log(set2)

            // 增删案例
            const set3 = new Set() // 创建一个空的Set
            set3.add("kxj") // 添加数据
            set3.add("kkk")
            set3.add("kkk")
            set3.add(12)
            console.log(set3)  //输出: {'kxj', 'kkk', 12}
            set3.delete("kkk") //删除值为"kkk"的数据
            console.log(set3.has(12)) // set集合中是否有元素12
            console.log(set3)  //输出: {'kxj', 12}

            // forEach方法迭代
            const set5 = new Set([1, 2, 3, 4])
            set5.forEach(value => {
                console.log(value)
            })

            // for..of方法遍历
            const set6 = new Set([1, 2, 3, 4])
            for(let a of set6){
                console.log(a)
            }

            //set的values()遍历
            const set7 = new Set([1, 2, 3, 4])
            const iterator = set7.values()
            for(let value of iterator){
                console.log(value)
            }

            //数组去重
            const arr = [1, 2, 3, 4, 4, 5, 5, 7, 2];
            console.log(arr) // 输出：1 2 3 4 4 5 5 7 2
            const arr1 = [...new Set(arr)]
            console.log(arr1) // 输出：1 2 3 4 5 7

            //数组和set转化
            const set = new Set([1,2,3])
            const arr3 = [...set]
            console.log(arr3) // [1,2,3]

            //数组转化为set
            const arr5 = [1,2,3,4,4,5]
            const set9 = new Set(arr5)
            console.log(set9)

        </script>
    </head>
</html>
