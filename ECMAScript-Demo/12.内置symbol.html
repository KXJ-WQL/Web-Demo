<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>内置symbol</title>
        
        <script type="text/javascript">
            // 1.Symbol.iterator迭代器
            const obj = {
                *[Symbol.iterator](){
                    yield 1;
                    yield 2;
                    yield 3;
                }
            }

            for(let value of obj){
                console.log(value) // 输出: 1 2 3
            }

            // 2.Symbol.toPrimitive对象转换
            const obj1 = {
                [Symbol.toPrimitive](hint){
                    if(hint === 'string'){
                        return "不支持转换为String类型"
                    }
                    return 42;
                }
            } 
            // 输出：
            console.log(String(obj1)) //输出："不支持转换为String类型"
            console.log(Number(obj1)) //输出：42
            console.log(Number(obj1 + 1)) //输出：43

            // 3.Symbol.toStringTag定制返回字符串标签
            const objw = {
                [Symbol.toStringTag]: 'CustomObject'
            };
            console.log(Object.prototype.toString.call(objw)) //输出： [object CustomObject]

            // 4.Symbol.hasInstance
            class MyClass{
                static [Symbol.hasInstance](instance){
                    return instance.hasOwnProperty('customProperty');
                }
            }

            const objh = {customProperty: 'value'}
            console.log(objh instanceof MyClass) //输出：true

            // 5.Symbol.isConcatSpreadable是否将某个对象元素展开
            const arr1 = [1,2,3]
            const arr2 = ['a','b','c']
            arr2[Symbol.isConcatSpreadable] = false
            const result = arr1.concat(arr2)
            console.log(result) //输出：[1,2,3,['a','b','c']]
        </script>
    </head>
</html>
