<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hello React</title>
        <meta charset="UTF-8">
    </head>


    <body>

        <!-- 创建渲染容器, React 会将虚拟 DOM (VDOM) 渲染并挂载到这个真实的 DOM 节点上 -->
         <div id="tit"></div>

         <!-- React 核心库，负责创建组件和虚拟 DOM -->
        <script src="https://unpkg.com/react@16/umd/react.development.js"></script>
        <!-- React 与 DOM 交互的库，负责将虚拟 DOM 渲染到真实页面 -->
        <script src="https://unpkg.com/react-dom@16/umd/react-dom.development.js"></script>
        <!-- Babel 编译器，用于将 JSX 语法（如 <h1>）转换为浏览器能理解的原生 JavaScript 代码 -->
        <script src="https://unpkg.com/babel-standalone@6.15.0/babel.min.js"></script>

        <script type="text/babel">

            //创建列表
            const list = React.createElement('ul', {className: 'todo-list'},
                React.createElement('li', {key: 1}, "任务1"),
                React.createElement('li', {key: 2}, "任务2"),
                React.createElement('li', {key: 3}, "任务3")
            )

            // 定义虚拟 DOM ,使用JSX语法
            const VDOM =  (<h1> hello react </h1>)

            // 创建带属性的标签
            const button = (
                <button 
                    className="btn-primary" 
                    onClick={() => alert('clicked')}
                    id="submit-btn">
                    提交
                </button>);
            
            // 渲染虚拟 DOM 到页面，ReactDOM.render() 是 React 的入口函数
            ReactDOM.render(button, document.getElementById("tit"))

            // 打印虚拟DOM
            console.log("虚拟DOM",VDOM)

        </script>

    </body>

</html>
