<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>JS编写的位置</title>
        <!--外部引用-->
        <script type="text/javascript" src="./js/external.js"></script>
        
        <!--内部引用-->
        <script type="text/javascript">
            alert("js内部引用")
        </script>

    </head>

    <body>
        <button onclick="alert('点击内置js-onclick');">点击一下</button>
        <a href="javascript:alert('点击内置js-a');">这是一个超链接</a>
    </body>
</html>
