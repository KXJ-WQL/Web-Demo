<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>boolean类型转换</title>
        <script type="text/javascript">
            
            var a = 12;
            var b = NaN;
            var c = 0;
            var d = -12;
            var e = "as";
            var f = "";
            var g = null;
            var h = undefined;

            //数字类型转换为boolean
            //1.正整数转换
            console.log("1.正整数转换："+Boolean(a))
            //2.负数转换
            console.log("2.负数转换："+Boolean(d))
            //3.NaN转换
            console.log("3.NaN转换："+Boolean(b))
            //4.0转换
            console.log("4.0转换："+Boolean(c))

            //字符类型转换为boolean
            //5.字符转换
            console.log("5.字符转换："+Boolean(e))
            //6.空字符转换
            console.log("6.空字符转换："+Boolean(f))

            //7.null转换
            console.log("7.null转换："+Boolean(g))

            //8.undefined转换
            console.log("8.undefined转换："+Boolean(h))
        </script>
    </head>

    <body>

    </body>

</html>
