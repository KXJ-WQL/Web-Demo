<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>一元运算符</title>
        <script type="text/javascript">
            
            var a = "2";
            var b = "wa";
            var c =  true;
            var d = null;
            var e = undefined;

            //1.一元运算符作用于数值类型字符串
            var f = +a
            console.log("1.一元运算符作用于数值类型字符串：" + typeof f +"--值："+ f)

            //2.一元运算符作用于非数值类型字符串：
            var g = +b
            console.log("2.一元运算符作用于非数值类型字符串：" + typeof g +"--值："+ g)

             //3.一元运算符作用于boolean类型：
             var h = +c
            console.log("3.一元运算符作用于boolean类型：" + typeof h +"--值："+ h)

            //4.一元运算符作用于null类型：
            var i = +d
            console.log("4.一元运算符作用于null类型：" + typeof i +"--值："+ i)

             //5.一元运算符作用于undefined类型：
             var j = +e
            console.log("5.一元运算符作用于undefined类型：" + typeof j +"--值："+ j)

        </script>
    </head>

    <body>

    </body>

</html>
