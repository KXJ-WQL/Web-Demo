<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>switch条件判断</title>
        <script type="text/javascript">
            var wql = 4;

            switch(wql){
                case 1:
                    console.log("--壹")
                    break;
                case 2:
                    console.log("--贰")
                    break;
                case 3:
                    console.log("--叁")
                    break;
                default:
                    console.log("无符合条件！")
                    break;

            }

        </script>
    </head>

    <body>
    </body>
</html>
