<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>相等比较运算符</title>
        <script type="text/javascript">

            //基本使用
            var a = 1=='1' ? 20 : 0;
            //嵌套使用
            var b = 2==true ?(null=="" ? 20 : 0): (null==undefined? 21 : 1);

            console.log("'1' ? 20 : 0---->"+a)
            console.log("2==true ?(null=='' ? 20 : 0): (null==undefined? 21 : 1)---->"+b)
        </script>
    </head>

    <body>
        
    </body>

</html>
