<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>if条件判断</title>
        <script type="text/javascript">

            var a= 10;

            if(a>100){
                console.log("大于100")
            }else if(a>80){
                console.log("大于80")

            }else if(a>60){
                console.log("大于60")

            }else if(a>40){
                console.log("大于40")

            }else{
                console.log("else")
            }

        </script>
    </head>

    </body>
</html>
