<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>switch条件判断</title>
        <script type="text/javascript">
            
            //1.初始化一个变量
            var wql = 4;

            //2.在循环中设置一个条件表达式
            while(wql<10){
                console.log("wql的值："+wql)
                //3.定义一个更新表达式，每次更新初始化变量
                wql++;
            }

            var a = 1;

            do{
                console.log("先执行再判断")
            }while(a<1)
        </script>
    </head>

    <body>
    </body>
</html>
