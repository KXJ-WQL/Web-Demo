<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>相等比较运算符</title>
        <script type="text/javascript">

            var a = "10"
            var b = 10
            var c = null
            var d = undefined
            var e = true
        
            console.log("'10'==10："+(a==b))
            console.log("null==0："+(c==0))
            console.log("null==undefined："+(c==d))
            console.log("true=='1'："+(e=="1"))
            console.log("NaN==NaN："+(NaN==NaN))
            console.log("undefined==undefined："+(undefined==undefined))

            console.log("1==='1'："+(1==='1'))
            console.log("1===1："+(1===1))
            console.log("1!==true："+(1!==true))



        </script>
    </head>

    <body>

    </body>

</html>
