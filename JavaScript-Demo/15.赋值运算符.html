<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>赋值运算符</title>
        <script type="text/javascript">
            
            var a = 2;
            var b = 3;
            var c = 4;
            var d = 5;
            
            a += 2;
            b -= 2;
            c *= 2;
            d %= 2; 

            console.log("a： "+a)
            console.log("b： "+b)
            console.log("c： "+c)
            console.log("d： "+d)


        </script>
    </head>

    <body>

    </body>

</html>
