<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>for..in</title>
        <script type="text/javascript">
            
            //遍历对象
            var obj = {
                name:"霖",
                age:20,
                mes:"啦啦啦"
            }

            for(var a in obj){
                console.log("属性名：" + a +" -- 属性值："+ obj[a])
            }

            //遍历数组
            var arr =["马萨","欧尚"]

            for(var a in arr){
                console.log("索引下标：" + a +" -- 属性值："+ arr[a])
            }

          
        </script>
    </head>
    <body>
    </body>
</html>
