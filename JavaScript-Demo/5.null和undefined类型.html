<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>null和undefined类型</title>
        <script type="text/javascript">
            
            //声明a变量但并初始化赋值
            var a;
            console.log("a变量的值："+a);
            console.log("a变量的类型："+typeof a)

            //声明并初始化一个未null的变量
            var b = null;
            console.log("b变量的值："+b)
            console.log("b变量的类型："+typeof b)
        </script>
    </head>
    <body>
    </body>
</html>
