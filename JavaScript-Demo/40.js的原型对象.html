<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>js原型对象</title>
        <script type="text/javascript">
          
          //创建构造函数
          function Fun1(name,age){
            this.name = name;
            this.age = age;
          }

          //在Fun1原型对象中添加方法
          Fun1.prototype.output = function(){
            console.log("原型对象共享方法：name -- "+this.name+" age -- "+this.age)
          }

          //根据构造函数创建对象1
          var obj1 = new Fun1("晴天",12);
          obj1.output() //使用原型对象中的方法
         
          //根据构造函数创建对象2
          var obj2 = new Fun1("阴天",15);
          obj2.output() //使用原型对象中的方法

          //根据构造函数创建对象3
          var obj3 = new Fun1("雨天",20);
          obj3.output() //使用原型对象中的方法

          //通过对象3的__proto__在原型对象中在添加一个方法
          obj3.__proto__.input = function(){
            console.log("__proto__调用："+"name -- "+this.name+" age -- "+this.age)
          }

          //根据构造函数创建对象4
          var obj4 = new Fun1("阴雨天",25);
          obj4.input() //使用原型对象中的方法
        </script>
    </head>
    <body>
    </body>

</html>
