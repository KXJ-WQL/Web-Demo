<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>自加自减</title>
        <script type="text/javascript">
            var a = 1;
            var b = 1;

            //在原变量前自增，这是一个新的值
            console.log("a++的值："+(a++));
            //在原变量后自增，这是原值
            console.log("++b的值："+(++b));


        </script>
    </head>

    <body>

    </body>

</html>
