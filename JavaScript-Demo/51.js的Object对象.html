<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Object对象</title>
        <script type="text/javascript">

            // Object.keys(obj1)
            const obj = {name:"Alice", age:25}
            console.log(Object.keys(obj)) // 输出：['name', 'age']

            console.log(Object.values(obj)) // 输出：['Alice', 25]

            console.log(Object.entries(obj)) // 输出：[['name', 'Alice'], ['age', 25]]

            const target = {a:1}
            const source = {b:2,c:3}
            Object.assign(target, source)
            console.log(target) //输出：{a: 1, b: 2, c: 3}

            const proto = { greet: () => 'Hello' };
            const objs = Object.create(proto);
            console.log(objs.greet()); // 输出: 'Hello'

            const obj3 = { name: 'Alice' };
            console.log(obj3.hasOwnProperty('name')); // 输出: true
            console.log(obj3.hasOwnProperty('toString')); // 输出: false


        </script>
    </head>
    <body>
    </body>
</html>
