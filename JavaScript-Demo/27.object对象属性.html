<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>object对象属性</title>
        <script type="text/javascript">
          
          var obj = new Object();

          //1.添加对象属性
          obj.name = "空想家";
          obj.age = 20;
          console.log("1.添加属性",obj)
          
          //2.修改对象属性
          obj.name = "晴天";
          obj.age = 10;
          console.log("2.修改属性",obj)

          //3.删除对象属性
          delete obj.age
          console.log("3.删除属性",obj)

          //4.获取对象中某个属性
          console.log("4.获取对象中某个属性：对象名.属性名方式--> name"+obj.name)
          console.log("5.获取对象中某个属性：对象名['属性名']--> name"+obj["name"])

          console.log("是否用name属性","name" in obj)
          console.log("是否用age属性","age" in obj)
        </script>
    </head>
    <body>
    </body>
</html>
