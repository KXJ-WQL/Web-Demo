<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Number类型</title>
        <script type="text/javascript">
            var ber = 125
            
            //获取Number最大值和最小值
            var max = Number.MAX_VALUE
            var min = Number.MIN_VALUE
            console.log("最大值："+max)
            console.log("最小值："+min)

            //获取最大值和最小值的超极限
            console.log("最大值超极限："+ max*max)
            console.log("最小值超极限："+ max*-max)

            //获取变量类型
            var type = typeof(max)
            console.log("获取类型："+type)

            //为NaN特殊数字(表示非法数字)
            console.log("特殊数字："+ ("9" * "ac"))

        </script>
    </head>

    <body>

    </body>

</html>
