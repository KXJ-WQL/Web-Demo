<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>逻辑运算符</title>
        <script type="text/javascript">
           
           var a = 1;
           var b = null;
           var c = NaN;
           var d = 0;
           var e = "ss";
           var f = true;

           //1.number值1取反
           a = !a
           console.log("1.number值1取反：" + a)

           //2.null类型取反
           b = !b
           console.log("2.null类型取反：" + b)

           //3.NaN值取反
           c = !c
           console.log("3.NaN值取反：" + c)

           //4.number值0取反
           d = !d
           console.log("4.number值0取反：" + d)

           //5.string值"ss"取反
           e = !e
           console.log("5.string值ss取反:" + e)

           //6.true值1取反
           f = !f
           console.log("6.true值1取反：" + f)

        </script>
    </head>

    <body>

    </body>

</html>
