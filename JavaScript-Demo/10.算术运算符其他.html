<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>算术运算符(其他)</title>
        <script type="text/javascript">
            
            //-法运算(都转换为number类型计算包括字符串)
            //1.number和number相减
            var a = 1 - 1;
            console.log("1.number和number相减：" + a)

            //2.string类型数值和number相减
            var b = "1" - 1;
            console.log("2.string类型数值和number相减：" + b)

            //3.null和number相减
            var c = null - 1;
            console.log("3.null和number相减：" + c)

            //4.true和number相减
            var d = true - 1;
            console.log("4.true和number相减：" + d)

            //5.string类型非数值和number相减
            var e = "kj" - 1;
            console.log("5.string类型非数值和number相减：" + e)

            //6.undefined类型非数值和number相减
            var o = undefined - 1;
            console.log("6.undefined类型非数值和number相减：" + o)

            //*法运算(都转换为number类型计算包括字符串)
            //1.number和number相乘
            var g = 1 * 1;
            console.log("1.number和number相乘：" + g)

            //2.string类型数值和number相乘
            var h = "1" * 1;
            console.log("2.string类型数值和number相乘：" + h)

            //3.null和number相乘
            var i = null * 1;
            console.log("3.null和number相乘：" + i)

            //4.true和number相减
            var j = true * 1;
            console.log("4.true和number相乘：" + j)

            //5.string类型非数值和number相乘
            var k = "kj" * 1;
            console.log("5.string类型非数值和number相乘：" + k)

            //6.undefined类型非数值和number相乘
            var p = undefined - 1;
            console.log("6.undefined类型非数值和number相减：" + p)

            //除和取模都是一样的
                
        </script>
    </head>

    <body>

    </body>

</html>
