<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>string类型</title>
        <script type="text/javascript">
            //定义一个字符串类型的变量，并初始化赋值
            var wql = "wql-kxj";

            //变量进行修改，使用转义符
            wql = "wql\'-kxj"

            alert(wql);
        </script>
    </head>

    <body>

    </body>

</html>
