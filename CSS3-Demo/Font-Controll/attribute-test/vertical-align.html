<!DOCTYPE html>
<html >
    <head >
        <meta charset="UTF-8">
        <title>垂直对齐测试</title>
        <style>
            div div:nth-of-type(1){
                vertical-align: middle;
            }
            div div:nth-of-type(2){
                vertical-align: sub;
            }
            div div:nth-of-type(3){
                vertical-align: top;
            }
           
        </style>
    </head>

    <body>
        <div>
            <div>wql.luoqin.ltd</div>
            <div>wql.luoqin.ltd</div>
            <div>wql.luoqin.ltd</div>
        </div>
    </body>
</html>
