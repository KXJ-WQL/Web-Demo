<!DOCTYPE html>
<html >
    <head >
        <meta charset="UTF-8">
        <title>字体颜色测试</title>
        <style>
            div div:nth-of-type(1){
                color: red;
            }
            div div:nth-of-type(2){
                color: #a85b5b;
            }
            div div:nth-of-type(3){
                color: rgb(35, 192, 52);
            }
            div div:nth-of-type(4){
                color: rgba(35, 192, 52,.6);
            }
        </style>
    </head>

    <body>
        <div>
            <div>wql.luoqin.ltd</div>
            <div>wql.luoqin.ltd</div>
            <div>wql.luoqin.ltd</div>
            <div>wql.luoqin.ltd</div>
        </div>
    </body>
</html>
