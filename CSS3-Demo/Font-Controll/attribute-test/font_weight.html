            div div:nth-of-type(1){
                font-weight: normal;

            }
            div div:nth-of-type(2){

            }
            div div:nth-of-type(3){
                font-weight: bolder;
                font-size: small;
            }
            div div:nth-of-type(4){

                font-size: medium;
            }
            div div:nth-of-type(5){

                font-size: large;
            }
            div div:nth-of-type(6){
                font-weight: 200;
                font-size: x-large;
            }
            div div:nth-of-type(7){
                font-weight: 500;
                font-size: xx-large;
            }
        </style>
    </head>
