<!DOCTYPE html>
<html >
    <head >
        <meta charset="UTF-8">
        <title>字符排版测试</title>
        <style>
            div div:nth-of-type(1){
                writing-mode: vertical-rl;
            }
            div div:nth-of-type(2){
                writing-mode: vertical-lr;
            }
            div div:nth-of-type(3){
                writing-mode: vertical-lr;
            }
            div div:nth-of-type(4){
                writing-mode: sideways-lr;
            }
        </style>
    </head>

    <body>
        <div>
            <div>wql.luoqin.ltd</div>
            <div>wql.luoqin.ltd</div>
            <div>wql.luoqin.ltd</div>
            <div>wql.luoqin.ltd</div>
        </div>
    </body>
</html>
