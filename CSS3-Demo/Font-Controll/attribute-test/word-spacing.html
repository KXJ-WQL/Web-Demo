<!DOCTYPE html>
<html >
    <head >
        <meta charset="UTF-8">
        <title>字符间隔测试</title>
        <style>
            div div:nth-of-type(1){
                word-spacing: 1em;
                
            }
            div div:nth-of-type(2){
                letter-spacing: 1em;
            }
            div div:nth-of-type(3){
                word-spacing: 1em;
                letter-spacing: 1em;
            }
        </style>
    </head>

    <body>
        <div>
            <div>wql luoqin ltd</div>
            <div>wql luoqin ltd</div>
            <div>wql luoqin ltd</div>
        </div>
    </body>
</html>
