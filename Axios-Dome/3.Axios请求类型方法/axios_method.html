<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>axios methods</title>
        <link crossorigin="anonymous" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.3.6/axios.min.js"></script>
    </head>

    <body>
        <div class="container">
            <h2 class="page-header"> axios的基本使用 </h2>
            <button class="btn btn-primary"> 发送GET请求 </button>
            <button class="btn btn-warning"> 发送POST请求 </button>
            <button class="btn btn-success"> 发送PUT请求 </button>
            <button class="btn btn-danger"> 发送DELETE请求 </button>
        </div>
    </body>

    <script>
        //获取按钮
        const btns = document.querySelectorAll('button')

        //设置axios默认的请求类型
        axios.defaults.method = 'GET'
        //设置默认的baseURL
        axios.defaults.baseURL = 'http://location:3000'
        //设置params
        axios.defaults.params = {id:1}

            btns[0].onclick = function(){
                axios.get('http://localhost:3000/posts'
                ).then(response=>{
                    console.log(response)
                })

           }
        
            btns[1].onclick = function(){
                axios.post('http://localhost:3000/posts',{
                    "name": "风暴之女",
                    "age": "23"
                }).then(response=>{
                    console.log(response)
                })

            }

            btns[2].onclick = function(){
                axios.put('http://localhost:3000/posts/4',{
                    "name": "深海幽灵",
                    "age": "23"
                }).then(response=>{
                    console.log(response)
                })
            }

            btns[3].onclick = function(){
                axios.delete('http://localhost:3000/posts/3'
                ).then(response=>{
                    console.log(response)
                })
            }
    </script>
</html>
