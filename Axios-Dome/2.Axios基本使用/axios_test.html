<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>axios的基本使用</title>
        <link crossorigin="anonymous" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.3.6/axios.min.js"></script>
    </head>

    <body>
        <div class="container">
            <h2 class="page-header"> axios的基本使用 </h2>
            <button class="btn btn-primary"> 发送GET请求 </button>
            <button class="btn btn-warning"> 发送POST请求 </button>
            <button class="btn btn-success"> 发送PUT请求 </button>
            <button class="btn btn-danger"> 发送DELETE请求 </button>
        </div>
    </body>

    <script>
        //获取按钮
        const btns = document.querySelectorAll('button')

        //第一个按钮发送get请求(获取数据)
        btns[0].onclick = function(){
            //发送AJAX请求
            axios({
                //请求类型
                method: 'GET',
                //URL
                url: 'http://localhost:3000/posts'
            }).then(response =>{
                console.log(response)
            })}
        
            //第二个按钮发送post请求(添加数据)
            btns[1].onclick = function(){
            //发送AJAX请求
            axios({
                //请求类型
                method: 'POST',
                //URL
                url: 'http://localhost:3000/posts',
                //请求数据
                data:{
                    "name": "暴雪",
                    "age": "23"
                }
            }).then(response =>{
                console.log(response)
            })}

            //第三个按钮发送put请求(修改数据)
            btns[2].onclick = function(){
            //发送AJAX请求
            axios({
                //请求类型
                method: 'PUT',
                //URL
                url: 'http://localhost:3000/posts/4',
                //请求数据
                data:{
                    "name": "沙尘暴",
                    "age": "28"
                }
            }).then(response =>{
                console.log(response)
            })}

            //第四个按钮发送delete请求(删除数据)
            btns[3].onclick = function(){
            //发送AJAX请求
            axios({
                //请求类型
                method: 'DELETE',
                //URL
                url: 'http://localhost:3000/posts/5',
            }).then(response =>{
                console.log(response)
            })}
    </script>
</html>
