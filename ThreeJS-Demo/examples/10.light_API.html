<!DOCTYPE html>
<html lang="en">
    <head>
        <title>hello three</title>
        <meta charset="UTF-8">
    </head>

    <body>
        <script type="module">
            // 引入 Three.js 库
            import * as THREE from "three"
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
            import { VertexNormalsHelper } from 'three/examples/jsm/helpers/VertexNormalsHelper.js';

            // 创建场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x20232a);

            // 创建相机
            const camera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 2, 6);

            // 创建一个球体 geometry
            const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
            const sphereMaterial = new THREE.MeshStandardMaterial({
                color: "#6cb391",
                roughness: 0.1,
                metalness: 0.6
            });
            const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
            scene.add(sphere);

            // 添加平面地面
            const planeGeometry = new THREE.PlaneGeometry(10, 10);
            const planeMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00, side: THREE.DoubleSide });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -1.2;
            scene.add(plane);

            // // 添加环境光和点光源
            // const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            // scene.add(ambientLight);

            // 添加半球光
            // const hemisphereLight = new THREE.HemisphereLight(0xff99ff, 0x79ff4d, 0.8);
            // hemisphereLight.position.set(0, 1, 0);
            // scene.add(hemisphereLight);

            // 添加平行光
            // const directionLight =  new THREE.DirectionalLight(0xffffff, 1);
            // directionLight.position.set(2, 3, 1);
            // scene.add(directionLight); 
            // // 添加平行光辅助器
            // const directionalLightHelper = new THREE.DirectionalLightHelper(directionLight, 0.5);
            // scene.add(directionalLightHelper);

            // // 添加点光源
            // const pointLight = new THREE.PointLight(0xffffff, 4, 100, 2);
            // pointLight.position.set(2, 3, 1);
            // scene.add(pointLight);

            // // 添加点光源辅助器
            // const pointLightHelper = new THREE.PointLightHelper(pointLight, 0.5);
            // scene.add(pointLightHelper);

            // 添加聚光灯
            const spotLight = new THREE.SpotLight(0xffffff, 5, 5, Math.PI / 8, 0.5);
            spotLight.position.set(2, 3, 1);
            scene.add(spotLight);
            // 添加聚光灯辅助器
            const spotLightHelper = new THREE.SpotLightHelper(spotLight);
            scene.add(spotLightHelper);

            // 创建渲染器进行渲染显示
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', () => {renderer.render(scene, camera)});
            controls.enableDamping = true;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            });

            renderer.render(scene, camera);
        </script>
    </body>
</html>
