<!DOCTYPE html>
<html lang="en">
    <head>
        <title>hello three</title>
        <meta charset="UTF-8">
    </head>

    <body>
        <script type="module">
            // 引入 Three.js 库
            import * as THREE from "three"
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
            import { VertexNormalsHelper } from 'three/examples/jsm/helpers/VertexNormalsHelper.js';

            // 创建场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x20232a);

            // 创建相机
            const camera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 2, 6);

            // 创建一个球体 geometry
            const boxGeometry = new THREE.BoxGeometry(2, 2, 2);
            const boxMaterial = new THREE.MeshStandardMaterial({
                color: "#6cb391",
                roughness: 0.1,
                metalness: 0.6
            });
            const box = new THREE.Mesh(boxGeometry, boxMaterial);
            // 开启阴影投射
            box.castShadow = true;
            scene.add(box);
            
            // 添加平面地面
            const planeGeometry = new THREE.PlaneGeometry(10, 10);
            const planeMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00, side: THREE.DoubleSide });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            // 开启接收阴影
            plane.receiveShadow = true;
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -1.2;
            scene.add(plane);

            // 添加平行光
            const directionLight =  new THREE.DirectionalLight(0xffffff, 1);
            directionLight.position.set(2, 3, 1);
            // 支持阴影投射
            directionLight.castShadow = true;
            // 设置平行光的阴影属性
            // 阴影贴图分辨率，分辨率越高阴影越清晰，但性能消耗越大
            directionLight.shadow.mapSize.width = 2048;
            directionLight.shadow.mapSize.height = 2048;
            // 阴影相机裁剪面，决定阴影的可见范围
            // near: 阴影相机最近裁剪面
            directionLight.shadow.camera.near = 0.5;
            // far: 阴影相机最远裁剪面
            directionLight.shadow.camera.far = 10;
            scene.add(directionLight); 
            // 添加平行光辅助器
            const directionalLightHelper = new THREE.DirectionalLightHelper(directionLight, 0.5);
            scene.add(directionalLightHelper);

            // // 添加点光源
            // const pointLight = new THREE.PointLight(0xffffff, 5, 100, 2);
            // pointLight.position.set(2, 3, 1);
            // // 支持阴影投射
            // pointLight.castShadow = true;
            // scene.add(pointLight);

            // 添加点光源辅助器
            // const pointLightHelper = new THREE.PointLightHelper(pointLight, 0.5);
            // scene.add(pointLightHelper);

            // 控制点光源旋转的半径与角度
            const lightRadius = 4;
            let lightAngle = 0;

            // 创建渲染器进行渲染显示
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            // 开启阴影投射，必须开启才能显示阴影效果
            renderer.shadowMap.enabled = true;
            // 设置阴影投射类型：PCFSoftShadowMap提供最平滑的阴影边缘效果
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            });

            function animate() {
                requestAnimationFrame(animate);

                // 让点光源沿着水平圆形轨道绕物体旋转
                // lightAngle += 0.01;
                // pointLight.position.x = Math.cos(lightAngle) * lightRadius;
                // pointLight.position.z = Math.sin(lightAngle) * lightRadius;
                // pointLight.position.y = 2;
                // pointLightHelper.update();

                controls.update();
                renderer.render(scene, camera);
            }

            animate();
        </script>
    </body>
</html>
