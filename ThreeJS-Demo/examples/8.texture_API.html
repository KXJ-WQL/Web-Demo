<!DOCTYPE html>
<html lang="en">
    <head>
        <title>OrbitControls</title>
        <meta charset="UTF-8">
        <style>
            body { margin: 0; overflow: hidden; }
        </style>
    </head>
    
    <body>
        <script type="module">
            import * as THREE from 'three'
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
            import { RGBELoader } from 'three/examples/jsm/loaders/RGBELoader.js';

            // 创建场景
            const scene = new THREE.Scene()

            // 添加光照以便观察材质效果
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
          
            // 创建正方体
            const geometry = new THREE.BoxGeometry(2, 2, 2);

            // 创建加载管理
            const manager = new THREE.LoadingManager()

            //加载状态
            manager.onStart = (url, itemLoaded, itemsTotal) =>{
                console.log("开始加载纹理")
            }

            manager.onProgress = (url, itemLoaded, itemsTotal) =>{
                const progress = (itemLoaded / itemsTotal) * 100
                console.log(`加载进度: ${progress.toFixed(2)}%`);
            }


            // 创建纹理贴图加载器
            const textureLoad = new THREE.TextureLoader(manager)
            // 创建HDR环境贴图
            const RGBEloader = new RGBELoader(manager)
            

            // 加载HDR
            RGBEloader.load("../texture/minedump_flats_4k.hdr",(texture) =>{
                // 映射方式
                texture.mapping = THREE.EquirectangularReflectionMapping;
                // 环境光
                scene.environment = texture;
                // 背景
                scene.background = texture;
            })


            // 集中加载纹理
            const colorMap = textureLoad.load("../texture/Facade001_4K_Color.jpg") // 加载颜色纹理贴图
            const normalMap = textureLoad.load("../texture/Facade001_4K_NormalGL.jpg") // 加载法线贴图
            const roughnessMap = textureLoad.load("../texture/Facade001_4K_Roughness.jpg") // 加载粗糙度贴图
            const metalnessMap = textureLoad.load("../texture/Facade001_4K_Metalness.jpg") // 加载金属度贴图
            const displacementMap = textureLoad.load("../texture/Facade001_4K_Displacement.jpg") // 加载置换贴图
            
            
            // 创建材质
            const material = new THREE.MeshStandardMaterial({
                map: colorMap,
                normalMap: normalMap,
                roughnessMap: roughnessMap,
                metalnessMap: metalnessMap,
                roughness: 0.8 //粗糙度
            })
            
            // 创建网格
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            

            // 添加网格平面 (GridHelper)
            const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0x444444);
            scene.add(gridHelper);

            // 创建相机 - 参数: 视场角(45度), 宽高比(窗口宽/高), 近裁剪面(0.1), 远裁剪面(1000)
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000)
            camera.position.set(2,2,3)
            camera.lookAt(0,0,0)

            // 创建渲染器
            const renderer = new THREE.WebGLRenderer({ antialias : true})
            renderer.setSize(window.innerWidth, window.innerHeight)
            document.body.appendChild(renderer.domElement)


            // 创建轨道控制器
            const orbitControl = new OrbitControls(camera, renderer.domElement)
            // 禁用平移
            orbitControl.enablePan = false;
            //轨道控制器添加事件(相机位置/目标点发生变化时触发)
            orbitControl.addEventListener('change', ()=>{
                // 重新渲染
                renderer.render(scene, camera)
            })

            
            manager.onLoad = () => {
                console.log("所有纹理加载完成!!")
                renderer.render(scene, camera);
            };
            
        </script>
    </body>
</html>
