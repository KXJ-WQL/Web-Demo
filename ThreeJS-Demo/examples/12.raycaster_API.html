<!DOCTYPE html>
<html lang="en">
    <head>
        <title>hello three</title>
        <meta charset="UTF-8">
    </head>

    <body>
        <script type="module">
            // 引入 Three.js 库
            import * as THREE from "three"
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
            import { VertexNormalsHelper } from 'three/examples/jsm/helpers/VertexNormalsHelper.js';

            // 创建场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x20232a);

            // 创建相机
            const camera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 5, 6);
            // 相机缩放，改变视图放大/缩小效果
            camera.zoom = 0.6;
            // 更新相机投影矩阵，必须在修改相机属性后调用才能生效
            camera.updateProjectionMatrix();
            

            // 创建一个立方体 geometry 并添加到场景
            const boxGeometry = new THREE.BoxGeometry(2, 2, 2);
            const boxMaterial = new THREE.MeshStandardMaterial({
                color: "#6cb391",
                roughness: 0.1,
                metalness: 0.6
            });
            const box = new THREE.Mesh(boxGeometry, boxMaterial);
            // 启用该物体对光线投射阴影
            box.castShadow = true;
            scene.add(box);

            // 创建一球体 geometry
            const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
            const sphereMaterial = new THREE.MeshStandardMaterial({
                color: "#e2bb87",
                roughness: 0.1,
                metalness: 0.6
            });
            const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
            sphere.position.set(3, 0, 0);
            sphere.castShadow = true;
            scene.add(sphere);


            // 添加平面地面
            const planeGeometry = new THREE.PlaneGeometry(50, 50, 2, 2);
            const planeMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00, side: THREE.DoubleSide });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.name = 'ground';
            // 开启接收阴影
            plane.receiveShadow = true;
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -1.2;
            scene.add(plane);

            // 添加平行光
            const directionLight =  new THREE.DirectionalLight(0xffffff, 1);
            directionLight.position.set(2, 6, 1);
            // 支持阴影投射
            directionLight.castShadow = true;
            // 设置平行光的阴影属性
            // 阴影贴图分辨率，分辨率越高阴影越清晰，但性能消耗越大
            directionLight.shadow.mapSize.width = 2048;
            directionLight.shadow.mapSize.height = 2048;
            directionLight.shadow.camera.near = 0.5;
            directionLight.shadow.camera.far = 10;
            scene.add(directionLight); 
            // 添加平行光辅助器
            const directionalLightHelper = new THREE.DirectionalLightHelper(directionLight, 0.5);
            scene.add(directionalLightHelper);


            // 创建射线对象，用于检测鼠标与场景物体的交点
            const raycaster = new THREE.Raycaster();
            // 创建鼠标坐标向量，用于存储归一化设备坐标（NDC）
            const mouse = new THREE.Vector2();
            // 当前悬停高亮对象引用，便于恢复原始材质状态
            let currentHoveredObject = null;

            // 恢复上一个高亮对象的 emissive 发光属性
            function restoreHover() {
                if (currentHoveredObject) {
                    currentHoveredObject.material.emissive.copy(currentHoveredObject.userData.originalEmissive);
                    currentHoveredObject = null;
                }
            }

            // 应用高亮发光效果，不改变物体原始颜色
            function applyHoverEffect(object) {
                if (currentHoveredObject === object) return;

                restoreHover();
                if (object) {
                    if (!object.userData.originalEmissive) {
                        object.userData.originalEmissive = object.material.emissive.clone();
                    }
                    object.material.emissive.set(0x333333);
                    currentHoveredObject = object;
                }
            }

            // 监听鼠标移动事件，计算射线并判断是否悬停在物体上
            window.addEventListener('pointermove', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);

                if (intersects.length > 0) {
                    // 排除地面对象，只高亮其他物体
                    const hoveredObject = intersects[0].object;
                    if(hoveredObject.name !== 'ground') {
                        console.log('Hovered object:', hoveredObject);
                        applyHoverEffect(hoveredObject);
                    } else {
                        restoreHover();
                    }
                } else {
                    restoreHover();
                }
            });


            // 创建渲染器进行渲染显示
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            // 开启阴影投射，必须开启才能显示阴影效果
            renderer.shadowMap.enabled = true;
            // 设置阴影投射类型：PCFSoftShadowMap提供最平滑的阴影边缘效果
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            });

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }

            animate();
        </script>
    </body>
</html>
