<!DOCTYPE html>
<html lang="en">
    <head>
        <title>hello three</title>
        <meta charset="UTF-8">
    </head>

    <body>
        <script type="module">
            // 完整的科幻风格 Bloom 场景
import * as THREE from 'three';
import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

// 初始化
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.008);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(5, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// 轨道控制
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// 创建发光物体
// 1. 核心球体
const coreMaterial = new THREE.MeshStandardMaterial({
    color: 0xff3366,
    emissive: 0xff3366,
    emissiveIntensity: 1.5,
    metalness: 0.9,
    roughness: 0.1
});
const core = new THREE.Mesh(new THREE.SphereGeometry(0.8, 64, 64), coreMaterial);
scene.add(core);

// 2. 环绕光环
const ringMaterial = new THREE.MeshStandardMaterial({
    color: 0x33ffff,
    emissive: 0x33ffff,
    emissiveIntensity: 1.2,
    metalness: 0.8,
    roughness: 0.2,
    transparent: true,
    opacity: 0.9
});
const ring = new THREE.Mesh(new THREE.TorusGeometry(1.2, 0.08, 128, 200), ringMaterial);
scene.add(ring);

// 3. 粒子系统（产生光晕粒子）
const particleCount = 500;
const particlesGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
    // 分布在球体周围
    const radius = 1.5 + Math.random() * 1.5;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    
    particlePositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
    particlePositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
    particlePositions[i*3+2] = radius * Math.cos(phi);
    
    // 颜色：红/蓝/青
    const colorChoice = Math.random();
    if (colorChoice < 0.33) {
        particleColors[i*3] = 1; particleColors[i*3+1] = 0.2; particleColors[i*3+2] = 0.4;
    } else if (colorChoice < 0.66) {
        particleColors[i*3] = 0.2; particleColors[i*3+1] = 0.6; particleColors[i*3+2] = 1;
    } else {
        particleColors[i*3] = 0; particleColors[i*3+1] = 1; particleColors[i*3+2] = 0.8;
    }
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particlesGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMaterial = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, blending: THREE.AdditiveBlending });
const particles = new THREE.Points(particlesGeometry, particleMaterial);
scene.add(particles);

// 4. 漂浮粒子（产生光晕尾迹）
const trailCount = 1000;
const trailGeometry = new THREE.BufferGeometry();
const trailPositions = new Float32Array(trailCount * 3);
for (let i = 0; i < trailCount; i++) {
    trailPositions[i*3] = (Math.random() - 0.5) * 12;
    trailPositions[i*3+1] = (Math.random() - 0.5) * 8;
    trailPositions[i*3+2] = (Math.random() - 0.5) * 10 - 5;
}
trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
const trailMaterial = new THREE.PointsMaterial({ color: 0x44aaff, size: 0.03, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
const trails = new THREE.Points(trailGeometry, trailMaterial);
scene.add(trails);

// 5. 环境光 + 点光源
const ambientLight = new THREE.AmbientLight(0x111122);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff3366, 1);
pointLight.position.set(1, 1, 1);
scene.add(pointLight);

const fillLight = new THREE.PointLight(0x3366ff, 0.5);
fillLight.position.set(-1, 0.5, 1);
scene.add(fillLight);

// Bloom 效果配置
const renderScene = new RenderPass(scene, camera);
const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.8,  // strength
    0.5,  // radius
    0.1   // threshold（低阈值让更多物体产生 Bloom）
);

const effectComposer = new EffectComposer(renderer);
effectComposer.addPass(renderScene);
effectComposer.addPass(bloomPass);

// 动画变量
let time = 0;

// 动画循环
function animate() {
    time += 0.01;
    
    // 核心球体脉动
    const scale = 1 + Math.sin(time * 3) * 0.05;
    core.scale.set(scale, scale, scale);
    
    // 光环旋转
    ring.rotation.x = Math.sin(time * 0.5) * 0.5;
    ring.rotation.y = time * 0.8;
    ring.rotation.z = Math.cos(time * 0.3) * 0.3;
    
    // 粒子系统旋转
    particles.rotation.y = time * 0.2;
    particles.rotation.x = Math.sin(time * 0.15) * 0.3;
    
    // 漂浮粒子缓慢移动
    const positions = trails.geometry.attributes.position.array;
    for (let i = 0; i < trailCount; i++) {
        positions[i*3] += (Math.random() - 0.5) * 0.01;
        positions[i*3+1] += (Math.random() - 0.5) * 0.01;
        positions[i*3+2] += (Math.random() - 0.5) * 0.01;
        
        // 边界重置
        if (Math.abs(positions[i*3]) > 6) positions[i*3] = (Math.random() - 0.5) * 12;
        if (Math.abs(positions[i*3+1]) > 4) positions[i*3+1] = (Math.random() - 0.5) * 8;
        if (Math.abs(positions[i*3+2]) > 5) positions[i*3+2] = (Math.random() - 0.5) * 10;
    }
    trails.geometry.attributes.position.needsUpdate = true;
    
    // 动态调整 Bloom 强度（呼吸效果）
    bloomPass.strength = 1.5 + Math.sin(time * 0.5) * 0.5;
    
    // 光源颜色变化
    pointLight.intensity = 0.8 + Math.sin(time * 1.2) * 0.4;
    pointLight.color.setHSL(0.05 + Math.sin(time * 0.7) * 0.02, 1, 0.5);
    
    // 更新控制器和渲染
    controls.update();
    effectComposer.render();
    
    requestAnimationFrame(animate);
}

animate();

// 窗口适配
window.addEventListener('resize', onWindowResize, false);
function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    effectComposer.setSize(window.innerWidth, window.innerHeight);
}

console.log('科幻风格 Bloom 效果已启动');
        </script>
    </body>
</html>
